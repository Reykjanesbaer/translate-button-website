<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payload-style Translate Button</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body,
    html.translated-ltr body,
    html.translated-rtl body {
      top: 0 !important;
    }

    body {
      margin: 0;
      padding: 20px;
      color: #17202a;
      background: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
    }

    .demoRow {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /*
      The Payload/Vercel site uses build-generated CSS-module class names such as
      ControlButton-module-scss-module__kWBLTG__controlTranslateOuter. Those hashed
      names are unstable and were used only as a visual reference. This demo mirrors
      the same structure with stable class names: controlTranslateOuter,
      controlTranslateButton, and controlTranslateWidget.
    */
    .controlTranslateOuter {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .controlTranslateButton {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid rgba(17, 24, 39, 0.18);
      border-radius: 999px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 160ms ease;
    }

    .controlTranslateButton:hover,
    .controlTranslateOuter:hover .controlTranslateButton {
      background: #f5f5f3;
    }

    .controlTranslateButton:focus-visible {
      outline: 2px solid #111827;
      outline-offset: 3px;
    }

    /* The Google widget sits invisibly on top of the custom button so a
       click on the visible IS control opens Google's injected SIMPLE
       selector directly. Do not set pointer-events: none here. */
    .controlTranslateWidget {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0.01;
      z-index: 3;
    }

    .controlTranslateWidget .goog-te-gadget,
    .controlTranslateWidget .goog-te-gadget-simple {
      width: 44px !important;
      height: 44px !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      background: transparent !important;
    }

    /* Hide Google branding inside the overlay and any injected extras. */
    .goog-logo-link,
    .goog-te-gadget img,
    .goog-te-balloon-frame,
    #goog-gt-tt {
      display: none !important;
    }

    .sampleText {
      margin: 0;
      color: #475467;
      font-size: 0.95rem;
    }

    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    iframe.goog-te-banner-frame,
    iframe.VIpgJd-ZVi9od-ORHb-OEVmcd {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="demoRow">
    <div class="controlTranslateOuter">
      <button type="button" class="controlTranslateButton" aria-label="Tungumál">
        <span aria-hidden="true" class="notranslate" translate="no">IS</span>
      </button>
      <div id="google_translate_element" class="controlTranslateWidget" aria-hidden="true"></div>
    </div>
    <p class="sampleText">Welcome to Reykjanesbær. Choose a language to translate this sample text.</p>
  </div>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,pl,es,uk,ar',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
