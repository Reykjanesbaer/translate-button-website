<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payload-style Translate Button</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body,
    html.translated-ltr body,
    html.translated-rtl body {
      top: 0 !important;
    }

    body {
      margin: 0;
      padding: 20px;
      color: #17202a;
      background: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
    }

    .demoRow {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .controlTranslateOuter {
      position: relative;
      flex: 0 0 auto;
    }

    .controlTranslateButton {
      display: inline-grid;
      width: 48px;
      height: 48px;
      padding: 0;
      place-items: center;
      border: 1px solid #17202a;
      border-radius: 50%;
      color: #ffffff;
      background: #17202a;
      box-shadow: 0 5px 14px rgba(23, 32, 42, 0.18);
      font: 700 0.8rem/1 Arial, Helvetica, sans-serif;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .controlTranslateButton:hover {
      color: #17202a;
      background: #ffffff;
      transform: translateY(-1px);
    }

    .controlTranslateButton:focus-visible {
      outline: 3px solid #60a5fa;
      outline-offset: 3px;
    }

    .controlTranslateWidget {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0.01;
      pointer-events: none;
    }

    .sampleText {
      margin: 0;
      color: #475467;
      font-size: 0.95rem;
    }

    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    iframe.goog-te-banner-frame,
    iframe.VIpgJd-ZVi9od-ORHb-OEVmcd {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="demoRow">
    <div class="controlTranslateOuter">
      <button type="button" class="controlTranslateButton" aria-label="Tungumál">
        <span aria-hidden="true" class="notranslate" translate="no">IS</span>
      </button>
      <div id="google_translate_element" class="controlTranslateWidget" aria-hidden="true"></div>
    </div>
    <p class="sampleText">Welcome to Reykjanesbær. Choose a language to translate this sample text.</p>
  </div>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,pl,es,uk,ar',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }

    document.querySelector('.controlTranslateButton').addEventListener('click', function () {
      const translateTrigger = document.querySelector(
        '#google_translate_element .goog-te-menu-value, ' +
        '#google_translate_element .VIpgJd-ZVi9od-xl07Ob-lTBxed'
      );

      if (translateTrigger) {
        translateTrigger.click();
      }
    });
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
