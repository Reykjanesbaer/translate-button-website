<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payload-style Translate Button</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body,
    html.translated-ltr body,
    html.translated-rtl body {
      top: 0 !important;
    }

    body {
      margin: 0;
      padding: 20px;
      color: #17202a;
      background: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
    }

    .demoRow {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /*
      The Payload/Vercel site uses build-generated CSS-module class names such as
      ControlButton-module-scss-module__kWBLTG__controlTranslateOuter. Those hashed
      names are unstable and were used only as a visual reference. This demo mirrors
      the same structure with stable class names: controlTranslateOuter,
      controlTranslateButton, and controlTranslateWidget.
    */
    .controlTranslateOuter {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .controlTranslateButton {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid rgba(17, 24, 39, 0.18);
      border-radius: 999px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 160ms ease;
    }

    .controlTranslateButton:hover,
    .controlTranslateOuter:hover .controlTranslateButton {
      background: #f5f5f3;
    }

    .controlTranslateButton:focus-visible {
      outline: 2px solid #111827;
      outline-offset: 3px;
    }

    /* The Google SIMPLE widget stays in the DOM and functional, but is fully
       hidden over the button (opacity 0, no pointer events) so the only thing
       visible is the custom IS control. Clicks are forwarded to Google's
       language menu via JavaScript, and the menu anchors at the button. */
    .controlTranslateWidget {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    /* Hide every Google-injected branding element (logo, "Powered by Google",
       tooltip, banner) for both the classic and obfuscated gadget DOM. */
    .goog-te-gadget,
    .goog-te-gadget > span,
    .goog-logo-link,
    .goog-te-gadget-icon,
    .goog-te-gadget img,
    .goog-te-gadget-simple img,
    .goog-te-balloon-frame,
    #goog-gt-tt,
    .VIpgJd-ZVi9od-l4eHX-hSRGPd {
      color: transparent !important;
      font-size: 0 !important;
    }

    .goog-logo-link,
    .goog-te-gadget-icon,
    .goog-te-gadget img,
    .goog-te-gadget-simple img,
    .goog-te-balloon-frame,
    #goog-gt-tt,
    .VIpgJd-ZVi9od-l4eHX-hSRGPd {
      display: none !important;
    }

    .sampleText {
      margin: 0;
      color: #475467;
      font-size: 0.95rem;
    }

    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    iframe.goog-te-banner-frame,
    iframe.VIpgJd-ZVi9od-ORHb-OEVmcd {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="demoRow">
    <div class="controlTranslateOuter">
      <button type="button" class="controlTranslateButton" aria-label="Tungumál">
        <span aria-hidden="true" class="notranslate" translate="no">IS</span>
      </button>
      <div id="google_translate_element" class="controlTranslateWidget" aria-hidden="true"></div>
    </div>
    <p class="sampleText">Welcome to Reykjanesbær. Choose a language to translate this sample text.</p>
  </div>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,pl,es,uk,ar',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }

    // The Google widget is visually hidden, so forward clicks on the custom
    // IS button to Google's language menu trigger. Google injects that element
    // asynchronously, so resolve it at click time.
    document.querySelector('.controlTranslateButton').addEventListener('click', function () {
      var trigger = document.querySelector(
        '#google_translate_element .goog-te-menu-value, ' +
        '#google_translate_element a.goog-te-menu-value, ' +
        '#google_translate_element .VIpgJd-ZVi9od-xl07Ob-lTBxed'
      );

      if (trigger) {
        trigger.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
        trigger.click();
      }
    });
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
