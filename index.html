<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Translate Widget Demo</title>
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #202124;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #f8f9fa;
    }

    main {
      padding: 1.5rem;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
    }

    h1 {
      margin-top: 0;
    }

    section {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #dadce0;
    }

    h2 {
      margin: 0 0 0.75rem;
      font-size: 1.1rem;
    }

    .sample {
      padding: 0.75rem;
      background: #f1f3f4;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Google Translate Widget Demo</h1>
    <p>Allowed languages: English, Polish, Spanish, Ukrainian, Arabic.</p>
    <p class="sample">This sample paragraph can be used to test each translation widget.</p>

    <section>
      <h2>Vertical/default widget</h2>
      <div id="google_translate_vertical"></div>
    </section>

    <section>
      <h2>Horizontal widget</h2>
      <div id="google_translate_horizontal"></div>
    </section>

    <section>
      <h2>Simple widget</h2>
      <div id="google_translate_simple"></div>
    </section>
  </main>

  <script>
    function googleTranslateElementInit() {
      const includedLanguages = 'en,pl,es,uk,ar';

      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages
        },
        'google_translate_vertical'
      );

      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages,
          layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL
        },
        'google_translate_horizontal'
      );

      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        },
        'google_translate_simple'
      );
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
