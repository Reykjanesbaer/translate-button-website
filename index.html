<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Translate Widget Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      color: #111;
      background: #f7f7f7;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border: 1px solid #ddd;
      border-radius: 14px;
    }

    h1 {
      margin-top: 0;
    }

    .translate-box {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
    }

    .translate-box h2 {
      margin-top: 0;
      font-size: 20px;
    }

    #google_translate_element {
      margin-top: 12px;
    }

    .sample-text {
      margin-top: 24px;
      padding: 18px;
      border-radius: 10px;
      background: #eef4ff;
      border: 1px solid #cdddf8;
    }

    .goog-logo-link,
    .goog-logo-link:link,
    .goog-logo-link:visited,
    .goog-logo-link:hover,
    .goog-logo-link:active {
      display: none !important;
    }

    .goog-te-gadget {
      color: transparent !important;
    }

    .goog-te-gadget span {
      display: none !important;
    }

    .goog-te-gadget select,
    .goog-te-combo {
      display: inline-block !important;
      visibility: visible !important;
      opacity: 1 !important;
      min-width: 180px;
      min-height: 34px;
      margin: 0 !important;
      padding: 6px 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
      color: #111 !important;
      font-size: 14px !important;
      line-height: normal !important;
      cursor: pointer;
    }

    .VIpgJd-ZVi9od-l4eHX-hSRGPd,
    .VIpgJd-ZVi9od-l4eHX-hSRGPd:link,
    .VIpgJd-ZVi9od-l4eHX-hSRGPd:visited,
    .VIpgJd-ZVi9od-l4eHX-hSRGPd:hover,
    .VIpgJd-ZVi9od-l4eHX-hSRGPd:active {
      display: none !important;
    }

    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    iframe.goog-te-banner-frame {
      display: none !important;
    }

    body,
    html.translated-ltr body,
    html.translated-rtl body {
      top: 0 !important;
    }
  </style>
</head>
<body>
  <main>
    <h1>Google Translate Widget Demo</h1>

    <p>
      Allowed languages: English, Polish, Spanish, Ukrainian, Arabic.
    </p>

    <section class="translate-box">
      <h2>Vertical/default widget</h2>
      <div id="google_translate_element"></div>
    </section>

    <div class="sample-text">
      This sample paragraph can be used to test the translation widget.
    </div>
  </main>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages: 'en,pl,es,uk,ar'
        },
        'google_translate_element'
      );
    }
  </script>

  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
