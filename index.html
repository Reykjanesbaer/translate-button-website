<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Translate Widget Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 20px;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      color: #202124;
      background: #f5f7fa;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      background: #fff;
    }

    h1 {
      margin: 0 0 12px;
    }

    .sample-text {
      margin: 24px 0;
      padding: 18px;
      border-radius: 8px;
      background: #eef4ff;
    }

    .widget-section {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #dfe3e8;
      border-radius: 8px;
      background: #fafbfc;
    }

    .widget-section h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }

    .widget-frame {
      display: block;
      width: 100%;
      height: 70px;
      border: 0;
      background: transparent;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      main {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Google Translate Widget Demo</h1>
    <p>Allowed languages: English, Polish, Spanish, Ukrainian, Arabic.</p>

    <div class="sample-text">
      <strong>Sample text:</strong>
      This sample paragraph can be used to test each translation widget.
    </div>

    <section class="widget-section">
      <h2>Vertical/default widget</h2>
      <iframe class="widget-frame" src="vertical.html" title="Vertical Google Translate widget"></iframe>
    </section>

    <section class="widget-section">
      <h2>Horizontal widget</h2>
      <iframe class="widget-frame" src="horizontal.html" title="Horizontal Google Translate widget"></iframe>
    </section>

    <section class="widget-section">
      <h2>Simple widget</h2>
      <iframe class="widget-frame" src="simple.html" title="Simple Google Translate widget"></iframe>
    </section>
  </main>
</body>
</html>
